<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aarogyashree — PCOD/PCOS Care Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --rose: #d63f6e; --rose-dark: #a02050; --rose-light: #fce4ee;
  --blush: #fff5f8; --cream: #fdfaf7; --gold: #c9860f; --gold-light: #fef3db;
  --teal: #1b9e88; --teal-light: #e0f5f1;
  --deep: #1c0a14; --text: #2e1020; --muted: #7a5060;
  --border: rgba(214,63,110,0.14); --white: #ffffff;
  --sh: 0 4px 24px rgba(214,63,110,0.10);
  --sh2: 0 16px 48px rgba(214,63,110,0.18);
  --sh3: 0 2px 8px rgba(214,63,110,0.07);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--white);overflow-x:hidden;line-height:1.6}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--blush)}::-webkit-scrollbar-thumb{background:var(--rose);border-radius:99px}
.page{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.5rem;border:none;border-radius:99px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .22s;text-decoration:none;white-space:nowrap}
.btn-rose{background:var(--rose);color:#fff}.btn-rose:hover{background:var(--rose-dark);transform:translateY(-2px);box-shadow:0 8px 20px rgba(214,63,110,.3)}
.btn-outline{background:transparent;color:var(--rose);border:1.5px solid var(--rose)}.btn-outline:hover{background:var(--rose);color:#fff}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3)}.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#a0690a;transform:translateY(-2px)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#157a68;transform:translateY(-2px)}
.btn-sm{padding:.4rem 1rem;font-size:.78rem}
.btn-lg{padding:.8rem 2rem;font-size:.95rem}
.btn-block{width:100%;justify-content:center;padding:.85rem;font-size:.95rem}

/* ── HEADER ── */
.hdr{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:900;box-shadow:var(--sh3)}
.hdr-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;height:66px;gap:1rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;color:var(--rose);cursor:pointer;letter-spacing:-.3px;margin-right:1rem}
.logo span{color:var(--gold)}
.nav{display:flex;gap:.1rem;list-style:none;flex:1}
.nav a{color:var(--text);text-decoration:none;padding:.4rem .78rem;border-radius:8px;font-size:.825rem;font-weight:500;cursor:pointer;transition:all .18s;display:block}
.nav a:hover,.nav a.active{background:var(--blush);color:var(--rose)}
.hdr-actions{display:flex;align-items:center;gap:.6rem;margin-left:auto}
.avatar-chip{display:flex;align-items:center;gap:.6rem}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}

/* ── PAGE HERO ── */
.pg-hero{background:linear-gradient(135deg,#1c0a14 0%,#3c1628 55%,#5e1e3c 100%);padding:3.2rem 2rem 2.6rem;position:relative;overflow:hidden;text-align:center}
.pg-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 80%,rgba(214,63,110,.22) 0%,transparent 55%),radial-gradient(ellipse at 78% 20%,rgba(201,134,15,.12) 0%,transparent 50%)}
.pg-hero-c{position:relative;z-index:1}
.breadcrumb{color:rgba(255,255,255,.4);font-size:.78rem;margin-bottom:.9rem}
.breadcrumb span{color:var(--rose-light);cursor:pointer}.breadcrumb span:hover{color:#fff}
.pg-hero h1{font-size:clamp(1.8rem,5vw,3rem);color:#fff;margin-bottom:.65rem;font-weight:700}
.pg-hero h1 em{color:var(--rose);font-style:normal}
.pg-hero p{color:rgba(255,255,255,.62);font-size:.95rem;max-width:460px;margin:0 auto}

/* ── HERO ── */
.hero{min-height:100vh;background:linear-gradient(135deg,#1c0a14 0%,#3c1628 48%,#5e1e3c 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 28% 72%,rgba(214,63,110,.28) 0%,transparent 55%),radial-gradient(ellipse at 80% 18%,rgba(201,134,15,.14) 0%,transparent 50%)}
.hero-body{position:relative;z-index:1;max-width:740px}
.hero-tag{display:inline-block;background:rgba(214,63,110,.18);border:1px solid rgba(214,63,110,.35);color:var(--rose-light);padding:.32rem 1.1rem;border-radius:99px;font-size:.78rem;font-weight:500;margin-bottom:1.4rem;letter-spacing:.3px}
.hero h1{font-size:clamp(2.4rem,6vw,4.6rem);color:#fff;line-height:1.08;margin-bottom:1.3rem;font-weight:700}
.hero h1 em{color:var(--rose);font-style:normal}
.hero p{font-size:1.05rem;color:rgba(255,255,255,.68);max-width:490px;margin:0 auto 2.4rem;line-height:1.72}
.hero-btns{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap}
.hero-floor{position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(to top,#fff,transparent)}
.orb{position:absolute;border-radius:50%;filter:blur(55px);animation:floatOrb 9s ease-in-out infinite;pointer-events:none}
.orb1{width:320px;height:320px;background:rgba(214,63,110,.13);top:8%;left:-4%;animation-delay:0s}
.orb2{width:220px;height:220px;background:rgba(201,134,15,.1);bottom:20%;right:3%;animation-delay:3.5s}
@keyframes floatOrb{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

/* ── STATS BAR ── */
.stats-bar{background:linear-gradient(135deg,var(--rose),var(--rose-dark));padding:2.5rem 2rem}
.stats-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1.5rem;max-width:900px;margin:0 auto;text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:#fff}
.stat-l{color:rgba(255,255,255,.75);font-size:.82rem;margin-top:.15rem}

/* ── CONTAINER / SECTIONS ── */
.sec{padding:4rem 2rem}
.container{max-width:1280px;margin:0 auto}
.sec-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--rose);margin-bottom:.75rem;display:block}
.sec-title{font-size:clamp(1.7rem,3.2vw,2.7rem);font-weight:700;color:var(--deep);margin-bottom:.85rem;line-height:1.15}
.sec-title em{color:var(--rose);font-style:normal}
.sec-sub{color:var(--muted);font-size:.96rem;line-height:1.72;max-width:520px}
.tc{text-align:center}.tc .sec-sub{margin:0 auto}

/* ── CARD BASE ── */
.card{background:#fff;border-radius:18px;box-shadow:var(--sh);transition:all .28s;border:1px solid rgba(214,63,110,.07)}
.card:hover{transform:translateY(-7px);box-shadow:var(--sh2)}

/* ── QUICK LINKS ── */
.ql-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.2rem;margin-top:2.4rem}
.ql-card{background:#fff;border-radius:18px;padding:1.7rem 1.3rem;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:all .28s;border-bottom:3px solid transparent}
.ql-card:hover{transform:translateY(-7px);box-shadow:var(--sh2);border-bottom-color:var(--rose)}
.ql-icon{font-size:2.1rem;margin-bottom:.65rem}
.ql-card h3{font-size:.98rem;color:var(--deep);margin-bottom:.3rem}
.ql-card p{color:var(--muted);font-size:.78rem}
.ql-arr{display:inline-block;margin-top:.65rem;color:var(--rose);font-weight:700;font-size:.78rem}

/* ── WHY CARDS ── */
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.3rem;margin-top:2.6rem}
.why-card{padding:1.9rem;border-radius:18px;box-shadow:var(--sh);background:#fff;border-top:4px solid transparent;transition:all .28s}
.why-card:hover{transform:translateY(-7px);box-shadow:var(--sh2);border-top-color:var(--rose)}
.why-icon{font-size:2.1rem;margin-bottom:.85rem}
.why-card h3{font-size:1.08rem;color:var(--deep);margin-bottom:.45rem}
.why-card p{color:var(--muted);font-size:.87rem;line-height:1.62}

/* ── STEPS ── */
.steps-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.8rem;margin-top:2.6rem}
.step{text-align:center;padding:1.6rem 1rem}
.step-n{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.step h3{font-size:1rem;color:var(--deep);margin-bottom:.4rem}
.step p{color:var(--muted);font-size:.84rem;line-height:1.55}

/* ── TESTIMONIALS ── */
.test-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.3rem;margin-top:2.5rem}
.test-card{background:#fff;padding:1.7rem;border-radius:18px;box-shadow:var(--sh)}
.test-stars{color:var(--gold);font-size:.9rem;margin-bottom:.85rem;letter-spacing:.5px}
.test-txt{color:var(--text);font-size:.88rem;line-height:1.7;font-style:italic;margin-bottom:1rem}
.test-auth{display:flex;align-items:center;gap:.65rem}
.test-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem}
.test-info h5{font-weight:600;color:var(--deep);font-size:.88rem}
.test-info p{color:var(--muted);font-size:.75rem}

/* ── SYMPTOMS ── */
.sym-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.3rem;margin-top:2.5rem}
.sym-card{background:#fff;padding:1.6rem;border-radius:16px;box-shadow:var(--sh);display:flex;gap:1rem;align-items:flex-start;transition:all .25s}
.sym-card:hover{transform:translateX(5px);box-shadow:var(--sh2)}
.sym-ico{font-size:1.9rem;flex-shrink:0}
.sym-card h4{font-weight:600;color:var(--rose);margin-bottom:.3rem;font-size:.92rem}
.sym-card p{color:var(--muted);font-size:.84rem;line-height:1.55}

/* ── SYMPTOM CHECKER ── */
.checker-wrap{background:linear-gradient(135deg,#1c0a14,#3c1628);padding:3.5rem 2rem}
.chk-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:.8rem;margin-top:1.6rem}
.chk{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;padding:1rem;cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:.65rem;user-select:none}
.chk:hover,.chk.on{background:rgba(214,63,110,.17);border-color:rgba(214,63,110,.45)}
.chk input[type=checkbox]{accent-color:var(--rose);width:15px;height:15px;flex-shrink:0}
.chk label{color:rgba(255,255,255,.8);font-size:.84rem;cursor:pointer}
.chk .ci{font-size:1.2rem}
.score-box{margin-top:1.6rem;padding:1.7rem;background:rgba(255,255,255,.06);border-radius:16px;border:1px solid rgba(255,255,255,.1)}
.score-bar-bg{background:rgba(255,255,255,.1);border-radius:99px;height:10px;margin:.85rem 0;overflow:hidden}
.score-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--rose));transition:width .9s ease}
.score-t{color:#fff;font-size:1rem;font-weight:600}
.score-s{color:rgba(255,255,255,.58);font-size:.86rem;margin-top:.3rem}

/* ── COMPARE TABLE ── */
.cmp-wrap{margin-top:2rem;border-radius:18px;overflow:hidden;box-shadow:var(--sh)}
.cmp-wrap table{width:100%;border-collapse:collapse;background:#fff}
.cmp-wrap th{padding:1rem 1.3rem;font-size:.84rem;font-weight:700}
.cmp-wrap th:first-child{background:var(--blush);color:var(--muted)}
.cmp-pcod{background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff}
.cmp-pcos{background:linear-gradient(135deg,var(--teal),#157a68);color:#fff}
.cmp-wrap td{padding:.85rem 1.3rem;color:var(--text);border-bottom:1px solid #f5e5ec;font-size:.86rem}
.cmp-wrap td:first-child{color:var(--muted);font-weight:600;background:var(--blush)}
.cmp-wrap tr:last-child td{border:none}

/* ── EXERCISES ── */
.ex-wrap{background:linear-gradient(135deg,#0b2520,#163d35);padding:4rem 2rem}
.ex-tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin:1.6rem 0}
.ex-tab{padding:.48rem 1.2rem;border-radius:99px;border:1.5px solid rgba(27,158,136,.45);background:transparent;color:rgba(255,255,255,.65);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:500;transition:all .2s}
.ex-tab.active,.ex-tab:hover{background:var(--teal);border-color:var(--teal);color:#fff}
.ex-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.3rem}
.ex-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:1.7rem;transition:all .28s}
.ex-card:hover{background:rgba(255,255,255,.11);transform:translateY(-5px)}
.ex-em{font-size:2.1rem;margin-bottom:.8rem}
.ex-card h4{color:#fff;font-size:.98rem;margin-bottom:.35rem;font-weight:600}
.ex-card p{color:rgba(255,255,255,.55);font-size:.83rem;line-height:1.6;margin-bottom:.85rem}
.ex-meta{display:flex;gap:.4rem;flex-wrap:wrap}
.eb{padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:600}
.eb-t{background:rgba(27,158,136,.2);color:#2ec8b0;border:1px solid rgba(27,158,136,.28)}
.eb-g{background:rgba(201,134,15,.2);color:#f0b030;border:1px solid rgba(201,134,15,.28)}
.week-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:.9rem;margin-top:2rem}
.day-c{border-radius:13px;padding:1.2rem .9rem;text-align:center}
.day-e{font-size:1.4rem;margin-bottom:.38rem}
.day-c h4{font-size:.82rem;font-weight:700;margin-bottom:.22rem}
.day-c p{font-size:.75rem}

/* ── DOCTORS ── */
.doc-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.7rem;margin-top:2.6rem}
.doc-card{background:#fff;border-radius:22px;overflow:hidden;box-shadow:var(--sh);transition:all .28s;border:1px solid var(--border)}
.doc-card:hover{transform:translateY(-9px);box-shadow:var(--sh2)}
.doc-hdr{background:linear-gradient(135deg,var(--rose),var(--rose-dark));padding:1.7rem;text-align:center;position:relative}
.doc-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.28);border:3px solid rgba(255,255,255,.6);margin:0 auto .85rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.doc-name{font-family:'Cormorant Garamond',serif;font-size:1.12rem;color:#fff;font-weight:700}
.doc-spec{color:rgba(255,255,255,.75);font-size:.8rem;margin-top:.22rem}
.doc-rating{position:absolute;top:.85rem;right:.85rem;background:rgba(255,255,255,.18);color:#fff;padding:.22rem .6rem;border-radius:99px;font-size:.76rem;font-weight:600}
.doc-body{padding:1.5rem}
.doc-info{display:flex;flex-direction:column;gap:.42rem;margin-bottom:1.2rem}
.doc-inf{display:flex;gap:.5rem;align-items:center;font-size:.83rem;color:var(--muted)}
.avail{display:flex;gap:.32rem;flex-wrap:wrap;margin-bottom:1.2rem}
.ab{padding:.2rem .6rem;border-radius:99px;font-size:.71rem;font-weight:600}
.ab-on{background:#d4f5ee;color:#1a7a68}
.ab-cl{background:var(--gold-light);color:var(--gold)}
.ab-bz{background:#fde8e8;color:#a00000}
.doc-btn{width:100%;padding:.72rem;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .22s;font-size:.88rem}
.doc-btn-rose{background:var(--rose);color:#fff}.doc-btn-rose:hover{background:var(--rose-dark)}
.doc-btn-ghost{background:var(--blush);color:var(--rose)}.doc-btn-ghost:hover{background:var(--rose-light)}
.filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:1.4rem;margin-bottom:.4rem}
.fb{padding:.4rem 1rem;border-radius:99px;border:1.5px solid #f0dce5;background:var(--blush);color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;transition:all .18s}
.fb.active,.fb:hover{border-color:var(--rose);background:#fff;color:var(--rose);font-weight:600}

/* ── DASHBOARD ── */
.dash-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:2rem}
.dash-card{background:#fff;padding:1.5rem;border-radius:16px;box-shadow:var(--sh);transition:all .25s}
.dash-card:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.dash-card h4{color:var(--muted);font-size:.8rem;font-weight:500;margin-bottom:.4rem}
.dash-val{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;color:var(--rose);line-height:1}
.dash-lbl{color:var(--muted);font-size:.75rem;margin-top:.22rem}
.dash-acts{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:2rem}
.hist-wrap{background:#fff;border-radius:18px;padding:1.7rem;box-shadow:var(--sh);overflow-x:auto;margin-bottom:1.3rem}
.hist-wrap h3{font-family:'Cormorant Garamond',serif;color:var(--deep);margin-bottom:1.2rem;font-size:1rem}
.auth-gate{text-align:center;padding:4rem 2rem;max-width:420px;margin:0 auto}
.auth-gate h2{font-size:1.85rem;margin-bottom:.85rem}
.auth-gate p{color:var(--muted);margin-bottom:1.6rem;font-size:.92rem}
.ag-btns{display:flex;gap:.85rem;justify-content:center;flex-wrap:wrap}

/* ── DATABASE ── */
.db-wrap{background:#0e1a24;min-height:80vh;padding:3.5rem 2rem}
.db-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.85rem;margin-bottom:1.7rem}
.db-stat{background:#182533;border-radius:13px;padding:1rem 1.2rem;border:1px solid rgba(255,255,255,.07)}
.db-sv{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;color:var(--rose)}
.db-sl{color:rgba(255,255,255,.42);font-size:.75rem;margin-top:.12rem}
.db-tabs{display:flex;gap:.38rem;flex-wrap:wrap;margin-bottom:1.7rem}
.dbt{padding:.5rem 1.2rem;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;transition:all .18s}
.dbt.active{background:var(--rose);border-color:var(--rose);color:#fff}
.dbt:hover:not(.active){background:rgba(214,63,110,.14);color:rgba(255,255,255,.88)}
.db-table-wrap{background:#182533;border-radius:18px;padding:1.7rem;border:1px solid rgba(255,255,255,.07);overflow-x:auto}
.db-table-wrap h3{color:rgba(255,255,255,.85);font-family:'Cormorant Garamond',serif;margin-bottom:.35rem;font-size:1rem;display:flex;align-items:center;gap:.5rem}
.db-table-wrap .cb{background:var(--rose);color:#fff;padding:.1rem .5rem;border-radius:99px;font-size:.7rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600}
.db-meta{color:rgba(255,255,255,.28);font-size:.72rem;font-family:monospace;margin-bottom:1.2rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:rgba(214,63,110,.1);color:var(--rose);padding:.75rem .85rem;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:.75rem .85rem;color:rgba(255,255,255,.7);border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover td{background:rgba(214,63,110,.04)}

function showAlert(id, msg, type='ok') {
  const el = document.getElementById(id);

  el.className = `alert ${type} show`;
  el.textContent = msg;
  setTimeout(() => { el.className = 'alert'; el.textContent = ''; }, 5000);

function DatabasePage({ goTo, db, setDb, user }) {
  const [tab, setTab] = useState('users');
  const [sqlRes, setSqlRes] = useState('-- Select a query to run --');
  if (!user || user.email !== ADMIN_EMAIL) {
    return (
      <div className="page">
        <div className="db-wrap container">
          <div style={{textAlign:'center',padding:'4rem 0',color:'rgba(255,255,255,.5)'}}>
            <div style={{fontSize:'3rem',marginBottom:'1rem'}}>🔐</div>
            <p>Admin access only.</p>
            <button className="btn btn-rose" style={{marginTop:'1rem'}} onClick={()=>goTo('home')}>Go Home</button>
          </div>
        </div>
      </div>
    );
  }
  const queries = [
    {v:'',l:'-- Select a query --'},
    {v:'au',l:'SELECT * FROM users ORDER BY registered_at DESC'},
    {v:'ad',l:'SELECT * FROM doctors WHERE is_active = TRUE'},
    {v:'ah',l:'SELECT * FROM health_logs ORDER BY log_date DESC LIMIT 50'},
    {v:'ac',l:'SELECT * FROM consultations ORDER BY booked_at DESC'},
    {v:'pend',l:"SELECT * FROM consultations WHERE status = 'Pending'"},
    {v:'amsg',l:'SELECT * FROM contact_messages ORDER BY submitted_at DESC'},
    {v:'unrd',l:'SELECT * FROM contact_messages WHERE is_read = FALSE'},
    {v:'onl',l:'SELECT name,city,consultation_fee FROM doctors WHERE available_online = TRUE'},
  ];
  function runQuery(v) {
    const fmt = {
      au:()=>`-- ${db.users.length} rows --\n`+db.users.map(u=>`id:${u.id} | ${u.name} | ${u.email} | role:${u.role||'patient'}`).join('\n'),
      ad:()=>`-- ${db.doctors.filter(d=>d.is_active).length} active rows --\n`+db.doctors.filter(d=>d.is_active).map(d=>`id:${d.id} | ${d.name} | ${d.specialization} | ${d.city} | ₹${d.consultation_fee}`).join('\n'),
      ah:()=>`-- ${db.health.length} rows --\n`+(db.health.length?db.health.slice(-50).reverse().map(h=>`id:${h.id} | ${h.userName} | ${fmtDate(h.date)} | w:${h.weight}kg e:${h.energy}/10`).join('\n'):'(empty)'),
      ac:()=>`-- ${db.consults.length} rows --\n`+(db.consults.length?db.consults.slice().reverse().map(c=>`id:${c.id} | ${c.patientName} | ${(c.doctor||'').split('—')[0].trim()} | ${c.date} | ${c.status}`).join('\n'):'(empty)'),
      pend:()=>{const p=db.consults.filter(c=>c.status==='Pending');return `-- ${p.length} PENDING --\n`+(p.length?p.map(c=>`id:${c.id} | ${c.patientName} | ${c.date} ${c.time||''}`).join('\n'):'(none)');},
      amsg:()=>`-- ${db.contacts.length} rows --\n`+(db.contacts.length?db.contacts.slice().reverse().map(c=>`id:${c.id} | ${c.name} | ${c.email} | ${c.topic||'—'}`).join('\n'):'(empty)'),
      unrd:()=>{const u=db.contacts.filter(c=>!c.is_read);return`-- ${u.length} UNREAD --\n`+(u.length?u.map(c=>`id:${c.id} | ${c.name} | ${c.email}`).join('\n'):'(none)');},
      onl:()=>{const o=db.doctors.filter(d=>d.available_online);return`-- ${o.length} online docs --\n`+o.map(d=>`${d.name} | ${d.city} | ₹${d.consultation_fee}`).join('\n');},
    };
    setSqlRes(fmt[v]?fmt[v]():'-- Unknown query --');
  }
  function delItem(table,id){
    if(!confirm('Delete this record?'))return;
    const nb={...db,[table]:db[table].filter(i=>i.id!==id)};
    setDb(nb);saveDB(nb);
  }
  function togDoc(id){
    const nb={...db,doctors:db.doctors.map(d=>d.id===id?{...d,is_active:!d.is_active}:d)};
    setDb(nb);saveDB(nb);

═══════════════════════════════════════════════ */
function AuthModals({ db, setDb, setUser, goTo }) {
  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('lEmail').value.trim();
    const pass  = document.getElementById('lPass').value;
    if (email===ADMIN_EMAIL && pass===ADMIN_PASS) {
      const admin = {id:'admin-001',name:'Admin',email:ADMIN_EMAIL,role:'admin',registered_at:new Date().toISOString()};
      sessionStorage.setItem('ag_sess',JSON.stringify(admin));
      setUser(admin);
      showAlert('loginAlert','✓ Welcome, Admin! 🛡️','ok');
      setTimeout(()=>{closeModal('loginModal');goTo('database');},700);
      return;
    }
    const user = db.users.find(u=>u.email===email&&u.password===pass);
    if (user) {
      const upd={...user,last_login:new Date().toISOString()};
      const nb={...db,users:db.users.map(u=>u.id===upd.id?upd:u)};
      setDb(nb);saveDB(nb);
      sessionStorage.setItem('ag_sess',JSON.stringify(upd));
      setUser(upd);
      showAlert('loginAlert','✓ Login successful!','ok');
      setTimeout(()=>{closeModal('loginModal');goTo('dashboard');},700);
    } else {
      showAlert('loginAlert','✗ Invalid email or password.','err');
    }
  }
  function handleRegister(e) {
    e.preventDefault();
    const name=document.getElementById('rName').value.trim();
    const email=document.getElementById('rEmail').value.trim();
    const phone=document.getElementById('rPhone').value.trim();
    const age=document.getElementById('rAge').value;
    const pass=document.getElementById('rPass').value;
    if (db.users.find(u=>u.email===email)){showAlert('regAlert','✗ Email already registered.','err');return;}
    const user={id:Date.now(),name,email,phone,age,password:pass,role:'patient',registered_at:new Date().toISOString()};
    const nb={...db,users:[...db.users,user]};
    setDb(nb);saveDB(nb);
    sessionStorage.setItem('ag_sess',JSON.stringify(user));
    setUser(user);
    showAlert('regAlert','✓ Account created! Welcome to Aarogyashree 🌸','ok');
    setTimeout(()=>{closeModal('registerModal');goTo('dashboard');},800);
  }
  return (
    <>
      <Modal id="loginModal"><button className="close-btn" onClick={()=>closeModal('loginModal')}>✕</button><h3 className="m-title">Welcome Back 🌸</h3><div id="loginAlert" className="alert"/><form onSubmit={handleLogin}><div className="fg"><label>Email</label><input type="email" id="lEmail" required placeholder="your@email.com"/></div><div className="fg"><label>Password</label><input type="password" id="lPass" required placeholder="••••••••"/></div><button type="submit" className="btn btn-rose btn-block">Login</button></form><p style={{textAlign:'center',marginTop:'.9rem',color:'var(--muted)',fontSize:'.86rem'}}>No account? <a href="#" onClick={e=>{e.preventDefault();closeModal('loginModal');openModal('registerModal');}} style={{color:'var(--rose)',fontWeight:600}}>Sign up free</a></p></Modal>
      <Modal id="registerModal"><button className="close-btn" onClick={()=>closeModal('registerModal')}>✕</button><h3 className="m-title">Create Account 🌺</h3><div id="regAlert" className="alert"/><form onSubmit={handleRegister}><div className="fg"><label>Full Name</label><input type="text" id="rName" required placeholder="Your full name"/></div><div className="f2"><div className="fg"><label>Email</label><input type="email" id="rEmail" required placeholder="your@email.com"/></div><div className="fg"><label>Phone</label><input type="tel" id="rPhone" placeholder="+91..."/></div></div><div className="fg"><label>Age</label><input type="number" id="rAge" min="13" max="60" placeholder="Your age"/></div><div className="fg"><label>Password (min 6 chars)</label><input type="password" id="rPass" required minLength="6" placeholder="••••••••"/></div><button type="submit" className="btn btn-rose btn-block">Create Account</button></form></Modal>
    </>
  );
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function AIModal() {
  const [out, setOut] = useState('Your personalised plan will appear here...');
  async function generate() {
    const inp = document.getElementById('aiIn').value || 'PCOS patient looking for exercise guidance';
    setOut('⏳ Generating your personalised plan...');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are a certified PCOS exercise specialist. Create personalized, evidence-based exercise plans for women with PCOD/PCOS. Use warm, encouraging language with emojis. Focus on hormone regulation, insulin sensitivity, weight management, and mental health.',messages:[{role:'user',content:`Create a detailed weekly exercise plan for PCOS management. Context: ${inp}. Include: daily schedule, specific exercises with duration, why each helps PCOS, precautions, and motivational tips.`}]})});
      const d = await res.json();
      setOut(d.content?.[0]?.text||'Could not generate plan. Please try again.');
    } catch {
      setOut('⚠️ Quick Plan:\n\n🌅 Morning: 10 min Pranayama + 20 min brisk walk\n💪 3x/week: Resistance training (30 min)\n🧘 Daily: 15 min yoga (Supta Baddha Konasana)\n🌙 Evening: 10 min meditation\n\nConsistency matters more than intensity for PCOS!');
    }
  }
  return (
    <Modal id="aiModal" wide>
      <button className="close-btn" onClick={()=>closeModal('aiModal')}>✕</button>
      <h3 className="m-title">AI Exercise Planner 🤖</h3>
      <div id="aiOut">{out}</div>
      <div style={{marginTop:'1.2rem'}}>
        <div className="fg"><label>Describe your situation (optional)</label><textarea id="aiIn" placeholder="e.g. 28 year old, PCOS diagnosed, sedentary job, low energy, want to lose weight..."/></div>
        <button className="btn btn-teal btn-block" onClick={generate}>✨ Generate My Plan</button>
      </div>
    </Modal>
  );
}

      consultation_fee:parseFloat(document.getElementById('adFee').value)||0,
      rating:5.0,total_reviews:0,
      avatar_emoji:document.getElementById('adEmoji').value||'👩‍⚕️',
      available_online:document.getElementById('adOnline').checked,
      clinic_days:document.getElementById('adDays').value,
      is_active:true,created_at:new Date().toISOString()
    };
    const nb={...db,doctors:[...db.doctors,nd]};
    setDb(nb);saveDB(nb);
    showAlert('addDocAlert','✓ Doctor added successfully!','ok');
    e.target.reset();
    setTimeout(()=>closeModal('addDocModal'),1200);
  }
  return (
    <Modal id="addDocModal" wide dark>
      <button className="close-btn" onClick={()=>closeModal('addDocModal')}>✕</button>
      <h3 className="m-title">Add New Doctor ➕</h3>
      <div id="addDocAlert" className="alert"/>
      <form onSubmit={handleSubmit}>
        <div className="f2"><div className="fg"><label>Full Name *</label><input type="text" id="adName" required placeholder="Dr. Full Name"/></div><div className="fg"><label>Specialization *</label><input type="text" id="adSpec" required placeholder="e.g. Gynecologist"/></div></div>
        <div className="f2"><div className="fg"><label>Qualification</label><input type="text" id="adQual" placeholder="e.g. MBBS, MD"/></div><div className="fg"><label>Hospital</label><input type="text" id="adHosp" placeholder="Hospital name"/></div></div>
        <div className="f2"><div className="fg"><label>City</label><input type="text" id="adCity" placeholder="City"/></div><div className="fg"><label>Languages</label><input type="text" id="adLang" placeholder="Hindi, English"/></div></div>
        <div className="f2"><div className="fg"><label>Experience (yrs)</label><input type="number" id="adExp" min="0" placeholder="e.g. 10"/></div><div className="fg"><label>Consultation Fee (₹)</label><input type="number" id="adFee" min="0" placeholder="e.g. 800"/></div></div>
        <div className="f2"><div className="fg"><label>Clinic Days</label><input type="text" id="adDays" placeholder="e.g. Mon–Fri"/></div><div className="fg"><label>Avatar Emoji</label><input type="text" id="adEmoji" defaultValue="👩‍⚕️" maxLength="5"/></div></div>
        <div className="fg"><label style={{display:'flex',alignItems:'center',gap:'.65rem',cursor:'pointer'}}><input type="checkbox" id="adOnline" defaultChecked style={{width:'auto'}}/> Available Online</label></div>
        <button type="submit" className="btn btn-teal btn-block">Add Doctor to Database</button>
      </form>
    </Modal>
  );
}

/* ═══════════════════════════════════════════════
   AI CHATBOT
═══════════════════════════════════════════════ */
function Chatbot() {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{type:'bot',text:'Namaste! 🌸 I\'m Aarogy AI, your personal PCOS health assistant. How can I help you today?'}]);
  const [hist, setHist] = useState([]);
  const msgsRef = useRef(null);
  useEffect(()=>{ if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight; },[msgs]);
  async function send(text) {
    if (!text?.trim()) return;
    const newHist = [...hist,{role:'user',content:text}];
    setHist(newHist);
    setMsgs(m=>[...m,{type:'user',text},{type:'bot',text:'...thinking...',thinking:true}]);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],system:'You are Aarogy AI, a warm PCOS/PCOD health assistant for Aarogyashree, serving Indian women. Keep responses concise (3–5 sentences), warm, and practical. Respond in the same language as the user. Focus on PCOD/PCOS symptoms, diet, exercise, hormones, fertility, Ayurveda. Remind users to consult doctors for medical decisions. Use relevant emojis.',messages:newHist})});
      const d = await res.json();
      const reply = d.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n') || "I couldn't find an answer right now. Please try again!";
      setHist(h=>[...h,{role:'assistant',content:reply}]);
      setMsgs(m=>[...m.slice(0,-1),{type:'bot',text:reply}]);
    } catch {
      setMsgs(m=>[...m.slice(0,-1),{type:'bot',text:"I'm having trouble connecting right now. Please try again in a moment! 🌸"}]);
    }
  }
  function handleKey(e) { if(e.key==='Enter'){ send(e.target.value); e.target.value=''; } }
  function handleSend() { const el=document.getElementById('chatIn'); send(el.value); el.value=''; }
  return (
    <div className="chat-fab">
      <div className={`chat-win${open?' open':''}`}>
        <div className="ch-hdr">
          <div className="ch-av">🌸</div>
          <div className="ch-info"><h4>Aarogy AI</h4><p>PCOS Health Assistant</p></div>
          <div className="ch-dot"/>
        </div>
        <div className="chat-msgs" ref={msgsRef}>
          {msgs.map((m,i)=><div key={i} className={`cmsg ${m.type}${m.thinking?' thinking':''}`}>{m.text}</div>)}
        </div>
        <div className="qk-row">
          {['What is PCOS?','Best diet for PCOS','Exercises for PCOS','PCOS and pregnancy'].map(q=>(
            <span key={q} className="qk" onClick={()=>send(q)}>{q}</span>
          ))}
        </div>
        <div className="chat-ia">
          <input className="chat-in" id="chatIn" type="text" placeholder="Ask about PCOS, diet, exercises..." onKeyDown={handleKey}/>
          <button className="chat-send" onClick={handleSend}>➤</button>
        </div>
      </div>
      <button className="chat-tog" onClick={()=>setOpen(o=>!o)} title="Chat with AI">{open?'✕':'💬'}</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('home');
  const [db, setDb] = useState(()=>initDB());
  const [user, setUser] = useState(()=>{
    try { return JSON.parse(sessionStorage.getItem('ag_sess')); } catch { return null; }
  });
  function goTo(p) {
    if(p==='database' && (!user || user.email!==ADMIN_EMAIL)) { goTo('home'); return; }
    setPage(p);
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function logout() {
    sessionStorage.removeItem('ag_sess');
    setUser(null);
    setPage('home');
  }
  const pages = {
    home:      <HomePage goTo={goTo}/>,
    why:       <WhyPage goTo={goTo}/>,
    symptoms:  <SymptomsPage goTo={goTo}/>,
    exercises: <ExercisesPage goTo={goTo} user={user}/>,
    doctors:   <DoctorsPage goTo={goTo} db={db} user={user}/>,
    dashboard: <DashboardPage goTo={goTo} db={db} user={user}/>,
    database:  <DatabasePage goTo={goTo} db={db} setDb={setDb} user={user}/>,
    contact:   <ContactPage goTo={goTo} db={db} setDb={setDb}/>,
  };
  return (
    <>
      <Header page={page} goTo={goTo} user={user} onLogout={logout}/>
      {pages[page] || pages.home}
      <footer>
        <p>&copy; 2024 <strong>Aarogyashree</strong>. Made with 🌸 for every woman's health journey.</p>
        <p>This platform provides informational content and is not a substitute for professional medical advice.</p>
      </footer>
      <AuthModals db={db} setDb={setDb} setUser={setUser} goTo={goTo}/>
      <HealthModal db={db} setDb={setDb} user={user}/>
      <ConsultModal db={db} setDb={setDb} user={user}/>
      <AIModal/>
      <AddDoctorModal db={db} setDb={setDb}/>
      <Chatbot/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
